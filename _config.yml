about_content: | # this will include new lines to allow paragraphs
  Spring Boot 기반의 주문 API(브랜드/매장/제품/주문 등) 및 결제 페이지 개발을 했습니다.
  이직 후 금융사(카드/은행) 전문 송수신, 전문 처리 배치를 주도적으로 개발하여 안정적인 데이터 처리와 연계 시스템 구축을 하였습니다.
  ELK 활용하여 로그 시각화 및 알람 처리하여 모니터링 강화를 하였습니다.

  팀을 위해 개발하고, 함께 성장하는 것을 즐기는 개발자입니다. 효율적인 시스템을 만들기 위해 노력하며, 더 나은 서비스를 제공하는 데 기여하고 싶습니다.

